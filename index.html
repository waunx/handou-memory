<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>憨豆在彩虹桥</title>
    <style>
        :root {
            --ink: #423149;
            --cream: rgba(255, 250, 240, 0.9);
            --purple: #82659d;
            --dog-black: #17161a;
            --dog-soft: #28262c;
            --dog-brown: #6b432b;
            --dog-tan: #a46c3f;
            --muzzle: #f8efe5;
            --shirt: #0f5b4a;
            --shirt-light: #47b783;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.78) 0 8%, transparent 22%),
                radial-gradient(circle at 82% 16%, rgba(255, 237, 181, 0.82) 0 7%, transparent 21%),
                linear-gradient(180deg, #9289d6 0%, #f2b3c5 48%, #ffe6bd 100%);
        }

        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            min-height: 560px;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            inset: -20%;
            background:
                radial-gradient(circle at 50% 38%, rgba(255, 255, 230, 0.42), transparent 34%),
                radial-gradient(circle at 42% 68%, rgba(255, 255, 255, 0.38), transparent 26%);
            pointer-events: none;
            animation: softGlow 5s ease-in-out infinite;
        }

        @keyframes softGlow {
            50% { opacity: 0.72; transform: scale(1.02); }
        }

        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1px, transparent 2px),
                radial-gradient(circle, rgba(255, 248, 205, 0.86) 0 1px, transparent 2px);
            background-size: 110px 150px, 170px 130px;
            background-position: 24px 32px, 78px 68px;
            opacity: 0.65;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            50% { opacity: 0.35; }
        }

        .cloud {
            position: absolute;
            width: var(--w);
            height: var(--h);
            left: var(--x);
            top: var(--y);
            border-radius: 999px;
            background: rgba(255, 250, 242, 0.82);
            box-shadow:
                32px -18px 0 8px rgba(255, 250, 242, 0.82),
                70px -4px 0 3px rgba(255, 250, 242, 0.82),
                105px 15px 0 -6px rgba(255, 250, 242, 0.82);
            filter: blur(0.4px);
            animation: cloudDrift var(--duration) linear infinite;
            opacity: 0.8;
        }

        @keyframes cloudDrift {
            from { transform: translateX(-20vw); }
            to { transform: translateX(120vw); }
        }

        .rainbow {
            position: absolute;
            left: 50%;
            bottom: 25vh;
            width: min(760px, 118vw);
            height: 300px;
            transform: translateX(-50%);
            border-radius: 50% 50% 0 0;
            background:
                radial-gradient(ellipse at center bottom,
                    transparent 0 48%,
                    rgba(255, 106, 137, 0.82) 49% 53%,
                    rgba(255, 182, 99, 0.82) 54% 58%,
                    rgba(255, 234, 106, 0.84) 59% 63%,
                    rgba(108, 214, 130, 0.84) 64% 68%,
                    rgba(111, 196, 255, 0.82) 69% 73%,
                    rgba(181, 150, 255, 0.82) 74% 78%,
                    transparent 79%);
            filter: blur(0.2px) drop-shadow(0 18px 26px rgba(106, 84, 148, 0.2));
            opacity: 0.9;
        }

        .grass {
            position: absolute;
            left: -6vw;
            right: -6vw;
            bottom: -40px;
            height: 28vh;
            min-height: 170px;
            border-radius: 50% 50% 0 0 / 24% 24% 0 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(255, 255, 232, 0.6) 0 9%, transparent 38%),
                linear-gradient(180deg, #9be5a0 0%, #61bf78 100%);
            box-shadow: inset 0 16px 0 rgba(255, 255, 255, 0.22);
        }

        .flower {
            position: absolute;
            bottom: var(--bottom);
            left: var(--left);
            font-size: var(--size);
            opacity: 0.76;
            animation: bob 2.4s ease-in-out infinite;
        }

        @keyframes bob {
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        #dog-container {
            position: absolute;
            left: 50%;
            bottom: calc(13vh + 58px);
            width: min(440px, 92vw);
            transform: translateX(-50%);
            cursor: pointer;
            filter: drop-shadow(0 20px 22px rgba(74, 49, 92, 0.24));
            animation: floatDog 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes floatDog {
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        .bubble {
            position: absolute;
            left: var(--bubble-left, 50%);
            bottom: var(--bubble-bottom, 92%);
            width: min(370px, 86vw);
            padding: 13px 18px;
            transform: translate(var(--bubble-x, -50%), 8px);
            border: 6px solid transparent;
            border-radius: 24px 24px 24px 12px;
            background:
                linear-gradient(#fffdf7, #fff8ea) padding-box,
                repeating-linear-gradient(
                    135deg,
                    #0f5b4a 0 10px,
                    #0f5b4a 10px 18px,
                    #15151a 18px 28px,
                    #15151a 28px 36px,
                    #47b783 36px 45px
                ) border-box;
            box-shadow: 0 10px 28px rgba(91, 67, 132, 0.16), 0 0 0 2px rgba(255, 255, 255, 0.72);
            color: #4b3653;
            line-height: 1.55;
            font-size: clamp(14px, 3.4vw, 17px);
            font-family: "Comic Sans MS", "Marker Felt", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.35s ease;
            z-index: 20;
        }

        .bubble-left {
            --bubble-left: 10%;
            --bubble-x: 0;
            --bubble-bottom: 86%;
        }

        .bubble-right {
            --bubble-left: 90%;
            --bubble-x: -100%;
            --bubble-bottom: 86%;
        }

        .bubble-center {
            --bubble-left: 50%;
            --bubble-x: -50%;
            --bubble-bottom: 94%;
        }

        .bubble::after {
            content: "";
            position: absolute;
            left: var(--tail-left, 48px);
            bottom: -14px;
            width: 22px;
            height: 22px;
            transform: rotate(45deg);
            background:
                linear-gradient(#fff8ea, #fff8ea) padding-box,
                repeating-linear-gradient(
                    135deg,
                    #0f5b4a 0 8px,
                    #15151a 8px 16px,
                    #47b783 16px 22px
                ) border-box;
            border-right: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        .bubble-right::after {
            left: auto;
            right: 48px;
        }

        .bubble-center::after {
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
        }

        .bubble.show {
            opacity: 1;
            transform: translate(var(--bubble-x, -50%), 0);
        }

        .bubble-text {
            display: block;
        }

        .dog-svg {
            display: none;
            width: 100%;
            height: auto;
            overflow: visible;
        }

        .real-head {
            display: block;
            width: auto;
            max-width: 100%;
            max-height: min(58vh, 520px);
            height: auto;
            margin: 0 auto;
            user-select: none;
            -webkit-user-drag: none;
            filter:
                drop-shadow(0 0 1px rgba(255, 255, 255, 1))
                drop-shadow(0 0 3px rgba(255, 255, 255, 0.95))
                drop-shadow(0 0 7px rgba(255, 255, 255, 0.86))
                drop-shadow(0 0 14px rgba(255, 245, 218, 0.68))
                drop-shadow(0 12px 22px rgba(42, 26, 54, 0.24))
                drop-shadow(0 0 32px rgba(255, 246, 204, 0.28));
            animation: breathe 3.1s ease-in-out infinite;
            transform-origin: 50% 72%;
            transition: opacity 0.35s ease, transform 0.35s ease, filter 0.35s ease;
        }

        .real-head.switching {
            opacity: 0;
            transform: scale(0.98) translateY(4px);
        }

        .body-group {
            animation: breathe 2.8s ease-in-out infinite;
            transform-origin: 220px 325px;
        }

        @keyframes breathe {
            50% { transform: translateY(-3px) scaleY(1.015); }
        }

        .tail {
            animation: wag 0.75s ease-in-out infinite alternate;
            transform-origin: 325px 255px;
        }

        @keyframes wag {
            from { transform: rotate(-9deg); }
            to { transform: rotate(17deg); }
        }

        .ear-left {
            animation: earLeft 4s ease-in-out infinite;
            transform-origin: 122px 126px;
        }

        .ear-right {
            animation: earRight 4.4s ease-in-out infinite;
            transform-origin: 310px 128px;
        }

        @keyframes earLeft {
            50% { transform: rotate(-3deg) translateY(2px); }
        }

        @keyframes earRight {
            50% { transform: rotate(4deg) translateY(2px); }
        }

        .eye-open {
            animation: eyeOpen 5.2s linear infinite;
        }

        .eye-closed {
            animation: eyeClosed 5.2s linear infinite;
            opacity: 0;
        }

        @keyframes eyeOpen {
            0%, 93%, 100% { opacity: 1; }
            95%, 97% { opacity: 0; }
        }

        @keyframes eyeClosed {
            0%, 93%, 100% { opacity: 0; }
            95%, 97% { opacity: 1; }
        }

        .halo {
            animation: halo 2s ease-in-out infinite;
            transform-origin: 220px 58px;
        }

        @keyframes halo {
            50% { opacity: 0.62; transform: translateY(-2px) scale(1.02); }
        }

        .message-board {
            position: absolute;
            left: 50%;
            bottom: 18px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            width: min(680px, calc(100vw - 22px));
            padding: 10px;
            transform: translateX(-50%);
            border: 1px solid rgba(130, 101, 157, 0.22);
            border-radius: 22px;
            background: rgba(255, 250, 240, 0.86);
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 30px rgba(83, 57, 106, 0.18);
            z-index: 30;
        }

        input,
        button {
            min-height: 44px;
            border: 0;
            border-radius: 15px;
            font: inherit;
        }

        input {
            width: 100%;
            padding: 0 14px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.85);
            outline: 1px solid rgba(130, 101, 157, 0.16);
        }

        button {
            padding: 0 18px;
            color: #fff;
            background: linear-gradient(135deg, #8d70b2, #be83b6);
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(126, 91, 154, 0.25);
        }

        .floating-text,
        .heart {
            position: absolute;
            pointer-events: none;
            z-index: 25;
            animation: floatUp 5s ease-out forwards;
        }

        .floating-text {
            max-width: min(420px, 82vw);
            color: #5d4770;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.95);
        }

        .heart {
            color: #f05c86;
            font-size: 26px;
        }

        .paper-plane-msg {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 26;
            pointer-events: none;
            color: #5b446b;
            font-weight: 700;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.9);
            font-size: clamp(15px, 2.6vw, 19px);
            animation: flyToRainbow 2.3s ease-in forwards;
        }

        .paper-plane-msg::before {
            content: "✈ ";
            color: #7f66b2;
            font-size: 30px;
            vertical-align: -3px;
        }

        @keyframes flyToRainbow {
            0% {
                opacity: 0;
                transform: translate(var(--sx), var(--sy)) scale(0.9) rotate(-8deg);
            }
            10% {
                opacity: 1;
            }
            70% {
                opacity: 1;
                transform: translate(var(--mx), var(--my)) scale(1.02) rotate(6deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--ex), var(--ey)) scale(0.78) rotate(0deg);
            }
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
            12% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -42vh) scale(1.16); }
        }

        @media (max-width: 720px) {
            .scene {
                min-height: 100dvh;
            }

            .cloud {
                opacity: 0.62;
                transform: scale(0.76);
            }

            .rainbow {
                bottom: 34vh;
                width: 138vw;
                height: 235px;
            }

            #dog-container {
                bottom: calc(18vh + 42px);
                width: min(410px, 96vw);
            }

            .real-head {
                max-height: 55vh;
            }

            .bubble {
                bottom: 88%;
                width: min(320px, 88vw);
                padding: 10px 13px;
            }

            .message-board {
                grid-template-columns: 1fr;
                bottom: 12px;
                border-radius: 18px;
            }

            input,
            button {
                min-height: 42px;
            }
        }
    </style>
</head>
<body>
    <main class="scene" aria-label="憨豆在彩虹桥上开心地向家人报平安">
        <div class="glow" aria-hidden="true"></div>
        <div class="stars" aria-hidden="true"></div>
        <div class="cloud" style="--x: 0vw; --y: 15vh; --w: 155px; --h: 56px; --duration: 46s;" aria-hidden="true"></div>

        <div class="rainbow" aria-hidden="true"></div>
        <div class="grass" aria-hidden="true"></div>
        <div class="flower" style="--left: 10%; --bottom: 16vh; --size: 22px;" aria-hidden="true">🌼</div>

                    <g class="eye-open">
                        <ellipse cx="168" cy="164" rx="23" ry="27" fill="#f3e4d6"/>

        </div>

        <form class="message-board" onsubmit="sendMessage(event)">
            <input type="text" id="user-input" placeholder="想对憨豆说点什么，她会在云朵上收到">
            <button type="submit">送到彩虹桥</button>
        </form>
    </main>

    <script>
        const dogMessages = [
            "我很开心，真的。这里的草地软软的，我跑起来一点也不累。",
            "我已经到彩虹桥啦，每天都有暖暖的阳光照着我。",
            "别担心我，我会在云朵上看着你们吃饭、睡觉、好好生活。",
            "我还穿着那件绿黑条纹小衣服呢，风吹过来很舒服。",
            "我知道你们很想我。我也想你们，但我现在很平安。",
            "你们笑的时候，我的小尾巴就会摇得更快。",
            "我在这里交到了很多新朋友，也会把你们的爱认真收好。",
            "不要一直哭哦，我希望你们带着我的爱继续过好每一天。",
            "我永远记得被你们抱着、摸摸头、叫我名字的日子。",
            "如果晚上看到一颗亮亮的小星星，那就是我在说：我很好。"
        ];

        const responseTails = [
            "我把你的思念收好啦，会变成今晚最亮的小星星。",
            "我也爱你们，我在这里一直很平安。",
            "要好好吃饭、好好睡觉，也要记得多笑一笑。",
            "我会带着你们的爱，在彩虹桥上开心地跑。",
            "你们想我的时候，看看天空，我一直都听得到。",
            "谢谢你们给过我的家，那是我最幸福的地方。"
        ];

        const ASSET_VERSION = "20260508-2145";
        const bubble = document.getElementById("dog-bubble");
        const bubbleText = document.getElementById("bubble-text");
        const dog = document.getElementById("dog-container");
        const input = document.getElementById("user-input");
        const headImage = document.getElementById("handou-head");
        const headImages = [
            "handou-assets/handou-cutout-01-santa.png",
            "handou-assets/handou-cutout-02-front-shirt.png",
            "handou-assets/handou-cutout-03-side-bed.png",
            "handou-assets/handou-cutout-04-standing.png",
            "handou-assets/handou-cutout-05-frame-shirt.png",
            "handou-assets/handou-cutout-06-smile.png",
            "handou-assets/handou-cutout-07-bed-look.png",
            "handou-assets/handou-cutout-08-scarf-side.png",
            "handou-assets/handou-cutout-09-shaved-full.png"
        ].map((src) => `${src}?v=${ASSET_VERSION}`);
        let currentHeadIndex = 0;
        const bubblePositions = ["bubble-left", "bubble-right", "bubble-center"];

        function showMessage(message) {
            bubbleText.innerText = message || dogMessages[Math.floor(Math.random() * dogMessages.length)];
            bubble.classList.remove(...bubblePositions);
            bubble.classList.add(bubblePositions[Math.floor(Math.random() * bubblePositions.length)]);
            bubble.classList.add("show");
            window.clearTimeout(showMessage.hideTimer);
            showMessage.hideTimer = window.setTimeout(() => {
                bubble.classList.remove("show");
            }, 6200);
        }

        function makeParticle(className, text, x, y, delay = 0) {
            window.setTimeout(() => {
                const el = document.createElement("div");
                el.className = className;
                el.innerText = text;
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                document.body.appendChild(el);
                window.setTimeout(() => el.remove(), 5600);
            }, delay);
        }

        function switchHead() {
            currentHeadIndex = (currentHeadIndex + 1) % headImages.length;
            headImage.src = headImages[currentHeadIndex];
        }

        function interactDog(message) {
            showMessage(message);
            switchHead();
            const rect = dog.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const topY = rect.top + rect.height * 0.35;

            for (let i = 0; i < 5; i += 1) {
                makeParticle("heart", "♥", centerX + Math.random() * 110 - 55, topY + Math.random() * 46, i * 130);
            }
        }

        function sendMessage(event) {
            event.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            const boardRect = document.querySelector(".message-board").getBoundingClientRect();
            const rainbow = document.querySelector(".rainbow").getBoundingClientRect();
            const plane = document.createElement("div");
            plane.className = "paper-plane-msg";
            plane.innerText = text;
            const startX = boardRect.left + boardRect.width * (0.46 + Math.random() * 0.08);
            const startY = boardRect.top + boardRect.height * (0.42 + Math.random() * 0.2);
            const midX = (startX + (rainbow.left + rainbow.width / 2)) / 2 + (Math.random() * 30 - 15);
            const midY = Math.max(40, startY - 180);
            const endX = rainbow.left + rainbow.width * 0.52;
            const endY = rainbow.top + rainbow.height * 0.25;
            plane.style.setProperty("--sx", `${startX}px`);
            plane.style.setProperty("--sy", `${startY}px`);
            plane.style.setProperty("--mx", `${midX}px`);
            plane.style.setProperty("--my", `${midY}px`);
            plane.style.setProperty("--ex", `${endX}px`);
            plane.style.setProperty("--ey", `${endY}px`);
            document.body.appendChild(plane);
            window.setTimeout(() => plane.remove(), 2500);
            input.value = "";

            window.setTimeout(() => {
                const tail = responseTails[Math.floor(Math.random() * responseTails.length)];
                interactDog(`收到咯。${tail}`);
            }, 1200);
        }

        dog.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                interactDog();
            }
        });

        window.setTimeout(() => showMessage(), 700);
        window.setInterval(() => showMessage(), 11000);
    </script>
</body>
</html>
